version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: beauty_user
      POSTGRES_PASSWORD: beauty_pass
      POSTGRES_DB: beauty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://beauty_user:beauty_pass@db/beauty_db
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  